services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - DATA_DIR=/data
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    volumes:
      - digit_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped

volumes:
  digit_data:
